<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="assets/your-song.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <button id="play-btn">▶ Play</button>
        <p class="volume-text">(Volume Up)</p>
    </div>

    <div id="main-content" class="hidden">
        <h1>Happy Birthday, Sis! 💖</h1>
        <p id="swipe-hint">↕ Swipe to see memories ↕</p>
        
        <div class="gallery">
            <img src="assets/photo1.jpg" alt="Memory 1">
            <img src="assets/photo2.jpg" alt="Memory 2">
            <img src="assets/photo3.jpg" alt="Memory 3">
            <img src="assets/photo4.jpg" alt="Memory 4">
            <img src="assets/photo5.jpg" alt="Memory 5">
            <img src="assets/photo6.jpg" alt="Memory 6">
            <img src="assets/photo7.jpg" alt="Memory 7">
            <img src="assets/photo8.jpg" alt="Memory 8">
            <img src="assets/photo9.jpg" alt="Memory 9">
            <img src="assets/photo10.jpg" alt="Memory 10">
            <img src="assets/photo11.jpg" alt="Memory 11">
            <img src="assets/photo12.jpg" alt="Memory 12">
            <img src="assets/photo13.jpg" alt="Memory 13">
            <img src="assets/photo14.jpg" alt="Memory 14">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
