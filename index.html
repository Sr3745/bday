<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" loop>
        <source src="assets/your-song.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <button id="play-btn">▶ Play</button>
        <p class="volume-text">(Volume Up)</p>
    </div>

    <div id="main-content" class="hidden">
        <h1>Happy Birthday, Sis! 💖</h1>
        
        <div class="gallery">
            <img src="assets/photo1.jpg" alt="Us together">
            <img src="assets/photo2.jpg" alt="Fun times">
            <img src="assets/photo3.jpg" alt="Another memory">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
